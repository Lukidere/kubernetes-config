apiVersion: v1
kind: Namespace
metadata:
  name: samba
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: samba-data
  namespace: samba
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: samba
  namespace: samba
spec:
  replicas: 1
  selector:
    matchLabels:
      app: samba
  template:
    metadata:
      labels:
        app: samba
    spec:
      containers:
        - name: samba
          image: dperson/samba:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: smb
              containerPort: 445
              protocol: TCP
            - name: netbios-ssn
              containerPort: 139
              protocol: TCP
          env:
            - name: USER
              valueFrom:
                secretKeyRef:
                  name: samba-credentials
                  key: username
            - name: PASS
              valueFrom:
                secretKeyRef:
                  name: samba-credentials
                  key: password
            - name: SHARE
              value: "share;/mount;yes;no;no;${USER};;;;K3s Samba Share"
          volumeMounts:
            - name: data
              mountPath: /mount
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: samba-data
---
apiVersion: v1
kind: Service
metadata:
  name: samba
  namespace: samba
spec:
  type: LoadBalancer
  selector:
    app: samba
  ports:
    - name: smb
      port: 445
      targetPort: 445
      protocol: TCP
    - name: netbios-ssn
      port: 139
      targetPort: 139
      protocol: TCP

apiVersion: v1
kind: Namespace
metadata:
  name: samba
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: samba-data
  namespace: samba
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: samba
  namespace: samba
spec:
  replicas: 1
  selector:
    matchLabels:
      app: samba
  template:
    metadata:
      labels:
        app: samba
    spec:
      containers:
        - name: samba
          image: ghcr.io/servercontainers/samba:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: smb
              containerPort: 445
              protocol: TCP
            - name: netbios-ssn
              containerPort: 139
              protocol: TCP
          env:
            - name: ACCOUNT_smbuser
              valueFrom:
                secretKeyRef:
                  name: samba-credentials
                  key: password
            - name: SAMBA_VOLUME_CONFIG_share
              value: |
                [share]
                  path = /shares
                  browseable = yes
                  read only = no
                  guest ok = no
                  valid users = smbuser
                  force user = smbuser
                  create mask = 0664
                  directory mask = 0775
          volumeMounts:
            - name: data
              mountPath: /shares
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: samba-data
---
apiVersion: v1
kind: Service
metadata:
  name: samba
  namespace: samba
spec:
  type: LoadBalancer
  selector:
    app: samba
  ports:
    - name: smb
      port: 445
      targetPort: 445
      protocol: TCP
    - name: netbios-ssn
      port: 139
      targetPort: 139
      protocol: TCP
